name: Daily site refresh

on:
  schedule:
    # Primary targets ~5pm ET, right after the 4pm ET close (yfinance adjusted
    # closes have settled by then). NOTE: GitHub's `schedule` trigger is
    # BEST-EFFORT — runs land 60-90 min late and are sometimes dropped entirely
    # under load (Monday 2026-06-15 was dropped, leaving the site a trading day
    # stale), so actual execution is ~6-6:30pm ET, not 5pm sharp; nominal-5pm is
    # as early as a free GitHub cron can target. Mitigation: fire three times on
    # spread-out, non-round minutes (round :00/:30 are GitHub's most-contended,
    # most-dropped slots) so a dropped/delayed primary is caught by a backstop.
    # The "commit series if changed" guard makes redundant fires idempotent —
    # only the run that finds new closes commits and deploys; the rest rebuild,
    # see no diff, and exit in ~1 min. Holidays self-skip the same way (series is
    # byte-identical when markets are shut). UTC is fixed, so clock times drift
    # 1h between EDT and EST — all three stay safely after the 4pm ET close in
    # both seasons.
    - cron: '5 21 * * 1-5'    # primary — ~5:05pm EDT / 4:05pm EST, post-close
    - cron: '35 22 * * 1-5'   # backstop 1 — ~90 min later, same UTC day
    - cron: '35 0 * * 2-6'    # backstop 2 — late catch-up (next UTC day)
  workflow_dispatch:

permissions:
  contents: write

# One refresh at a time: if a delayed primary and a backstop ever overlap, the
# later one queues rather than racing on the commit/push.
concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install yfinance pandas openpyxl pytest

      - name: Rebuild performance series (3 attempts — Yahoo throttles CI IPs)
        run: |
          for i in 1 2 3; do
            python scripts/track_performance.py --series-only && exit 0
            echo "attempt $i failed; retrying in 60s"
            sleep 60
          done
          echo "::error::yfinance failed after 3 attempts — site keeps yesterday's data"
          exit 1

      - name: Commit series if changed
        id: commit
        run: |
          if git diff --quiet tracking/performance-series.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "series unchanged (holiday / no new data) — skipping deploy"
          else
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add tracking/performance-series.json
            git commit -m "chore(data): daily performance series $(date -u +%F)"
            git pull --rebase origin main
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Inline deploy: a GITHUB_TOKEN push cannot trigger deploy-site.yml.
      - run: python -m pytest tests -q
        if: steps.commit.outputs.changed == 'true'
      - run: python scripts/export_site_data.py
        if: steps.commit.outputs.changed == 'true'
      - run: python scripts/check_site.py
        if: steps.commit.outputs.changed == 'true'
      - uses: cloudflare/wrangler-action@v4
        if: steps.commit.outputs.changed == 'true'
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=ai-supply-chain
