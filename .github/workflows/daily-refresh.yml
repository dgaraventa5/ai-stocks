name: Daily site refresh

on:
  schedule:
    # GitHub's `schedule` trigger is BEST-EFFORT: runs land 60-90 min late and
    # are sometimes dropped entirely under load (Monday 2026-06-15 was dropped,
    # leaving the site a trading day stale). Mitigation: fire three times on
    # spread-out, non-round minutes so a dropped/delayed primary is caught by a
    # backstop. The "commit series if changed" guard makes redundant fires
    # idempotent — only the run that finds new closes commits and deploys; the
    # rest rebuild, see no diff, and exit in ~1 min. Holidays self-skip the same
    # way (series is byte-identical when markets are shut).
    - cron: '45 21 * * 1-5'   # primary — after close, ~5:45pm ET (EDT)
    - cron: '35 23 * * 1-5'   # backstop 1 — ~2h later, same UTC day
    - cron: '25 2 * * 2-6'    # backstop 2 — early-AM catch-up (next UTC day)
  workflow_dispatch:

env:
  # Match deploy-site.yml: GitHub forces Node 24 for actions from 2026-06-16.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

# One refresh at a time: if a delayed primary and a backstop ever overlap, the
# later one queues rather than racing on the commit/push.
concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install yfinance pandas openpyxl pytest

      - name: Rebuild performance series (3 attempts — Yahoo throttles CI IPs)
        run: |
          for i in 1 2 3; do
            python scripts/track_performance.py --series-only && exit 0
            echo "attempt $i failed; retrying in 60s"
            sleep 60
          done
          echo "::error::yfinance failed after 3 attempts — site keeps yesterday's data"
          exit 1

      - name: Commit series if changed
        id: commit
        run: |
          if git diff --quiet tracking/performance-series.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "series unchanged (holiday / no new data) — skipping deploy"
          else
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add tracking/performance-series.json
            git commit -m "chore(data): daily performance series $(date -u +%F)"
            git pull --rebase origin main
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Inline deploy: a GITHUB_TOKEN push cannot trigger deploy-site.yml.
      - run: python -m pytest tests -q
        if: steps.commit.outputs.changed == 'true'
      - run: python scripts/export_site_data.py
        if: steps.commit.outputs.changed == 'true'
      - run: python scripts/check_site.py
        if: steps.commit.outputs.changed == 'true'
      - uses: cloudflare/wrangler-action@v3
        if: steps.commit.outputs.changed == 'true'
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=ai-supply-chain
