name: Deploy portfolio site

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # GitHub forces Node 24 for actions from 2026-06-16; opt in early so a
  # breakage surfaces in an attended run, not an unattended Friday deploy.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install openpyxl pytest
      - run: python -m pytest tests -q
      - run: python scripts/export_site_data.py
      - run: python scripts/check_site.py
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=ai-supply-chain
